services:
  jarvis-voice:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Use host network to seamlessly access Whisper, Kokoro, Piper, and Ollama
    network_mode: "host"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./data:/app/data
      # CLI binaries and host tools
      - ~/.local:/home/generic/.local:ro
      - ~/.npm-global:/home/generic/.npm-global:ro
      # Cursor and AI contexts - RW to allow agents to save state, skills, and audio notes
      - ~/.cursor:/home/generic/.cursor
      - ~/.claude:/home/generic/.claude
      - ~/.haivemind:/home/generic/.haivemind
      # MCP Servers, Memory, and OAuth tokens - RW to allow auth refreshes and database updates
      - ~/.mcporter:/home/generic/.mcporter
      - ~/.mcp-auth:/home/generic/.mcp-auth
      - ~/.google_workspace_mcp:/home/generic/.google_workspace_mcp
      - ~/.workspace-mcp:/home/generic/.workspace-mcp
      - ~/.vibe-kanban:/home/generic/.vibe-kanban
      - ~/.playwright-mcp:/home/generic/.playwright-mcp
      - ~/.puppeteer-mcp-logs:/home/generic/.puppeteer-mcp-logs
      # Developer Identity and Cloud Configs - RW to allow auth refreshes or keep safe via RO
      - ~/.ssh:/home/generic/.ssh:ro
      - ~/.gitconfig:/home/generic/.gitconfig:ro
      - ~/.docker:/home/generic/.docker:ro
      - ~/.kube:/home/generic/.kube:ro
      - ~/.config/gcloud:/home/generic/.config/gcloud:ro
      # Full read/write access to ~/dev so cursor-agent can code locally on the host
      - ~/dev:/home/generic/dev
      # External drives and mounts
      - /media/generic:/media/generic
      - /mnt:/mnt
    restart: "no"