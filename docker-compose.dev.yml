services:
  jarvis-voice:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Use host network to seamlessly access Whisper, Kokoro, Piper, and Ollama
    network_mode: "host"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./data:/app/data
      # Map all necessary CLI binaries, auth tokens, and contexts for MCP/Agent access
      - ~/.local:/home/generic/.local:ro
      - ~/.npm-global:/home/generic/.npm-global:ro
      - ~/.cursor:/home/generic/.cursor:ro
      - ~/.openclaw:/home/generic/.openclaw:ro
      - ~/.ssh:/home/generic/.ssh:ro
      # Full read/write access to ~/dev so cursor-agent can code locally on the host
      - ~/dev:/home/generic/dev
      # External drives and mounts
      - /media/generic:/media/generic
      - /mnt:/mnt
      - ~/.config/gcloud:/home/generic/.config/gcloud:ro
      - ~/.google_workspace_mcp:/home/generic/.google_workspace_mcp:ro
    restart: "no"